# Rename app to your globally-unique Fly app name if needed.
app = "bubble-runtime-worker"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  DEBUG_OUTPUT_ENABLED = "false"
  TOTAL_INSPECTION_TIMEOUT_MS = "30000"
  GLOBAL_RATE_LIMIT_PER_MINUTE = "60"
  GLOBAL_RATE_LIMIT_PER_HOUR = "500"
  PER_CALLER_RATE_LIMIT_PER_MINUTE = "5"
  PER_CALLER_RATE_LIMIT_PER_HOUR = "20"
  MAX_CONCURRENT_INSPECTIONS = "2"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "get"
    path = "/health"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1024mb"
